<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Budget — Delete Bill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="notepad-wrapper">

        <div class="spiral-binding">
            {% for i in range(13) %}
            <div class="spiral-ring"></div>
            {% endfor %}
        </div>

        <div class="notepad-page form-page">
            <div class="form-title">Delete Bill?</div>

            <p class="confirm-entry">
                {{ entry.due_date.strftime('%b %d, %Y') }}
                &mdash; {{ entry.bill_name }}
                &mdash; ${{ "%.2f"|format(entry.amount_due) }}
            </p>

            <p style="color:#888; font-size:1.1rem; line-height:32px;">
                This cannot be undone.
            </p>

            <div class="form-actions" style="margin-top:32px;">
                <form method="POST" action="{{ url_for('delete', id=entry.id) }}" style="display:inline;">
                    <button type="submit" class="btn-danger">Yes, delete it</button>
                </form>
                <a href="javascript:history.back()" class="btn-ghost">No, go back</a>
            </div>
        </div>

    </div>
</body>
</html>
