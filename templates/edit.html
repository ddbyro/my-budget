<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Budget — Edit Bill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="notepad-wrapper">

        <div class="spiral-binding">
            {% for i in range(13) %}
            <div class="spiral-ring"></div>
            {% endfor %}
        </div>

        <div class="notepad-page form-page">
            <div class="form-title">Edit Bill</div>

            <form method="POST">
                <div class="form-field">
                    <label for="due_date">Due Date</label>
                    <input type="date" id="due_date" name="due_date"
                           value="{{ entry.due_date }}" required>
                </div>
                <div class="form-field">
                    <label for="bill_name">Bill Name</label>
                    <input type="text" id="bill_name" name="bill_name"
                           value="{{ entry.bill_name }}" required>
                </div>
                <div class="form-field">
                    <label for="amount_due">Amount Due</label>
                    <input type="number" id="amount_due" name="amount_due"
                           value="{{ entry.amount_due }}" step="0.01" min="0" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save</button>
                    <a href="javascript:history.back()" class="btn-ghost">Cancel</a>
                </div>
            </form>
        </div>

    </div>
</body>
</html>
