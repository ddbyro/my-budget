<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ budget_name }} — Edit Bill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@400;600;700&family=Courier+Prime:wght@400;700&family=Dancing+Script:wght@400;700&family=Indie+Flower&family=Kalam:wght@400;700&family=Lato:wght@400;700&family=Libre+Baskerville:wght@400;700&family=Merriweather:wght@400;700&family=Montserrat:wght@400;700&family=Nunito:wght@400;700&family=Open+Sans:wght@400;700&family=Pacifico&family=Patrick+Hand&family=Permanent+Marker&family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&family=Roboto:wght@400;700&family=Shadows+Into+Light&family=Source+Code+Pro:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>:root { --font-main: '{{ font_family }}', sans-serif; } body { font-family: var(--font-main); }</style>
</head>
<body>
    <div class="notepad-wrapper">

        <div class="spiral-binding">
            {% for i in range(13) %}
            <div class="spiral-ring"></div>
            {% endfor %}
        </div>

        <div class="notepad-page form-page">
            <div class="form-title">Edit Bill</div>

            <form method="POST">
                <div class="form-field">
                    <label for="due_date">Due Date</label>
                    <input type="date" id="due_date" name="due_date"
                           value="{{ entry.due_date }}" required>
                </div>
                <div class="form-field">
                    <label for="bill_name">Bill Name</label>
                    <input type="text" id="bill_name" name="bill_name"
                           value="{{ entry.bill_name }}" required>
                </div>
                <div class="form-field">
                    <label for="amount_due">Amount Due</label>
                    <input type="number" id="amount_due" name="amount_due"
                           value="{{ entry.amount_due }}" step="0.01" min="0"
                           placeholder="Amount (optional)">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save</button>
                    <a href="javascript:history.back()" class="btn-ghost">Cancel</a>
                </div>
            </form>
        </div>

        <div class="page-nav">
            <a href="javascript:history.back()" class="nav-btn">&#8249; Back</a>
            <span class="page-indicator">{{ budget_name }}</span>
            <span class="nav-btn" style="visibility:hidden;">placeholder</span>
        </div>

    </div>
</body>
</html>
